<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Messages</title>
    <!-- Premium CSS Design System -->
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts & Boxicons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .message-card {
            margin-bottom: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--surface-border);
            padding-bottom: 15px;
        }
        .sender-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .sender-icon {
            width: 45px;
            height: 45px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .message-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <nav class="glass-nav scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo">Admin<span class="dot">.</span></a>
            <div class="nav-links" style="display:flex;">
                <a href="index.html" class="nav-link">Back to Portfolio</a>
            </div>
        </div>
    </nav>

    <div class="section-padding" style="margin-top: 50px;">
        <div class="admin-header">
            <div>
                <h1 class="main-title" style="font-size: 2.5rem; margin-bottom: 5px;">Inbox Overview</h1>
                <p style="color: var(--text-secondary);">Manage your contact submissions.</p>
            </div>
            <button class="btn btn-primary" onclick="fetchMessages()"><i class='bx bx-refresh'></i> Refresh Data</button>
        </div>

        <div id="messages-container">
            <div class="glass-card empty-state">
                <i class='bx bx-loader-alt bx-spin' style="font-size: 2rem; color: var(--primary);"></i>
                <p style="margin-top: 10px;">Loading messages...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '<div class="glass-card empty-state"><i class="bx bx-loader-alt bx-spin" style="font-size: 2rem; color: var(--primary);"></i><p style="margin-top: 10px;">Loading messages...</p></div>';

            try {
                const response = await fetch('/api/messages');
                if (!response.ok) throw new Error('Failed to fetch');
                const messages = await response.json();

                if (messages.length === 0) {
                    container.innerHTML = '<div class="glass-card empty-state"><i class="bx bx-inbox" style="font-size: 3rem; margin-bottom:15px; display:block; color: var(--text-secondary);"></i>No messages have been submitted yet!</div>';
                    return;
                }

                container.innerHTML = '';
                messages.forEach(msg => {
                    const dateObj = new Date(msg.date);
                    const formattedDate = dateObj.toLocaleDateString() + ' &bull; ' + dateObj.toLocaleTimeString();

                    const card = document.createElement('div');
                    card.className = 'glass-card message-card reveal active';
                    card.innerHTML = `
                        <div class="message-header">
                            <div class="sender-info">
                                <div class="sender-icon"><i class='bx bx-user'></i></div>
                                <div>
                                    <h3 style="margin-bottom: 2px; font-size: 1.1rem;">${msg.name}</h3>
                                    <a href="mailto:${msg.email}" style="color: var(--primary); font-size: 0.9rem;">${msg.email}</a>
                                </div>
                            </div>
                            <div class="message-date">${formattedDate}</div>
                        </div>
                        <p style="color: var(--text-primary); line-height: 1.6; white-space: pre-wrap; font-size: 1rem;">${msg.message}</p>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="glass-card empty-state" style="color: #ef4444;"><i class="bx bx-error" style="font-size: 3rem; display:block; margin-bottom:15px;"></i>Failed to load messages from server. Make sure the Node.js backend is running.</div>';
            }
        }

        // Fetch messages on page load
        window.onload = fetchMessages;
    </script>
</body>
</html>
